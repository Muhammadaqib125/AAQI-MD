<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AAQI MD - Pairing Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6aff;
      --accent2: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(124,106,255,0.1) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 460px;
      animation: fadeUp 0.6s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .header { text-align: center; margin-bottom: 28px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(124,106,255,0.12);
      border: 1px solid rgba(124,106,255,0.25);
      border-radius: 100px; padding: 6px 14px;
      font-size: 12px; font-weight: 500; color: var(--accent2);
      margin-bottom: 14px; letter-spacing: 0.5px;
    }
    .badge span {
      width: 6px; height: 6px;
      background: var(--green); border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.8); }
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 44px; font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1; margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); font-size: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1.2px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* Server Grid */
    .server-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; margin-bottom: 4px;
    }
    .server-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 6px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .server-btn:hover { border-color: rgba(124,106,255,0.4); background: rgba(124,106,255,0.08); }
    .server-btn.selected {
      border-color: var(--accent);
      background: rgba(124,106,255,0.15);
    }
    .server-btn.full { opacity: 0.4; cursor: not-allowed; }
    .server-btn .s-name {
      font-size: 11px; font-weight: 600;
      font-family: 'Syne', sans-serif; color: var(--text);
    }
    .server-btn .s-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
    }
    .server-btn.online .s-dot { background: var(--green); }
    .server-btn.full .s-dot { background: var(--red); }
    .server-btn .s-count { font-size: 9px; color: var(--muted); }
    .server-info-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px; padding: 10px 14px;
      background: var(--surface2); border-radius: 10px;
      border: 1px solid var(--border);
    }
    .server-info-bar .selected-name {
      font-size: 13px; font-weight: 600; color: var(--accent2);
    }
    .server-info-bar .selected-stat {
      font-size: 11px; color: var(--muted);
    }

    /* Input */
    .input-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 10px; display: block;
    }
    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); font-size: 18px;
      pointer-events: none;
    }
    input {
      width: 100%; padding: 16px 16px 16px 48px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 16px; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s; outline: none;
    }
    input:focus {
      border-color: rgba(124,106,255,0.5);
      background: rgba(124,106,255,0.05);
    }
    input::placeholder { color: var(--muted); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* Button */
    button#btn {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, var(--accent), #9b87ff);
      color: white; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      letter-spacing: 0.3px; margin-bottom: 14px;
    }
    button#btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(124,106,255,0.35);
    }
    button#btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Result */
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px; text-align: center;
      animation: fadeUp 0.4s ease forwards;
    }
    .result-card.success { border-color: rgba(52,211,153,0.25); }
    .result-card.error { border-color: rgba(248,113,113,0.25); }
    .result-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px;
    }
    .pairing-code {
      font-family: 'Syne', sans-serif;
      font-size: 42px; font-weight: 800;
      letter-spacing: 8px; color: white;
      background: linear-gradient(135deg, #fff, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .server-tag {
      display: inline-block;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 100px; padding: 4px 12px;
      font-size: 11px; color: var(--green);
      margin-bottom: 20px;
    }
    .copy-btn {
      width: auto !important; padding: 10px 24px !important;
      background: rgba(124,106,255,0.15) !important;
      border: 1px solid rgba(124,106,255,0.3) !important;
      border-radius: 10px !important; font-size: 13px !important;
      margin-bottom: 20px !important;
      box-shadow: none !important;
    }
    .copy-btn:hover { background: rgba(124,106,255,0.25) !important; transform: none !important; }
    .steps {
      background: rgba(52,211,153,0.05);
      border: 1px solid rgba(52,211,153,0.12);
      border-radius: 12px; padding: 16px; text-align: left;
    }
    .steps p { font-size: 13px; color: #a7f3d0; line-height: 2; }
    .steps strong { color: var(--green); }
    .error-msg { font-size: 14px; color: var(--red); }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--muted);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge"><span></span> All Systems Online</div>
    <h1>AAQI MD</h1>
    <p class="subtitle">WhatsApp Linked Device Pairing System</p>
  </div>

  <!-- Server Selection -->
  <div class="card">
    <div class="section-title">Select Server</div>
    <div class="server-grid" id="serverGrid">
      <!-- Servers loaded dynamically -->
      <div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:10px;">
        Loading servers...
      </div>
    </div>
    <div class="server-info-bar">
      <span class="selected-name" id="selectedName">No server selected</span>
      <span class="selected-stat" id="selectedStat">Select a server above</span>
    </div>
  </div>

  <!-- Phone Number -->
  <div class="card">
    <label class="input-label">WhatsApp Number</label>
    <div class="input-wrapper">
      <span class="input-icon">📱</span>
      <input type="tel" id="number" placeholder="923001234567" maxlength="15" />
    </div>
    <p class="hint">Include country code — 92 for Pakistan, 1 for USA</p>
  </div>

  <button id="btn" onclick="generateCode()">🔑 Generate Pair Code</button>

  <div id="result"></div>

  <div class="footer">AAQI MD Bot • Powered by Baileys</div>
</div>

<script>
  let selectedServer = null;

  // Load servers on page load
  async function loadServers() {
    try {
      const res = await fetch('/servers');
      const data = await res.json();
      renderServers(data.servers);
    } catch (e) {
      document.getElementById('serverGrid').innerHTML = 
        '<div style="grid-column:1/-1;text-align:center;color:var(--red);font-size:13px;padding:10px;">Failed to load servers</div>';
    }
  }

  function renderServers(servers) {
    const grid = document.getElementById('serverGrid');
    grid.innerHTML = '';
    servers.forEach(s => {
      const btn = document.createElement('div');
      const isFull = s.usage >= s.limit;
      btn.className = `server-btn ${s.connected ? 'online' : ''} ${isFull ? 'full' : ''}`;
      btn.innerHTML = `
        <div class="s-dot"></div>
        <div class="s-name">S${s.id}</div>
        <div class="s-count">${s.usage}/${s.limit}</div>
      `;
      if (!isFull) {
        btn.onclick = () => selectServer(s, btn);
      }
      grid.appendChild(btn);
    });
    // Auto select first available
    const first = servers.find(s => s.available);
    if (first) {
      const firstBtn = grid.children[first.id - 1];
      selectServer(first, firstBtn);
    }
  }

  function selectServer(server, btn) {
    selectedServer = server.id;
    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('selectedName').textContent = `Server ${server.id} Selected`;
    document.getElementById('selectedStat').textContent = `Active: ${server.usage}/${server.limit}`;
  }

  async function generateCode() {
    const number = document.getElementById('number').value.trim();
    const resultDiv = document.getElementById('result');
    const btn = document.getElementById('btn');

    if (!selectedServer) {
      resultDiv.innerHTML = `<div class="result-card error"><p class="error-msg">❌ Please select a server first</p></div>`;
      return;
    }
    if (!number) {
      resultDiv.innerHTML = `<div class="result-card error"><p class="error-msg">❌ Please enter your WhatsApp number</p></div>`;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div> Generating...`;
    resultDiv.innerHTML = '';

    try {
      const res = await fetch('/generate-pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phoneNumber: number, serverId: selectedServer })
      });

      const data = await res.json();

      if (data.success) {
        resultDiv.innerHTML = `
          <div class="result-card success">
            <p class="result-label">Your Pairing Code</p>
            <div class="pairing-code" id="codeText">${data.pairingCode}</div>
            <div class="server-tag">✅ Server ${data.serverId} • ${data.usage}/${data.limit} active</div><br>
            <button class="copy-btn" onclick="copyCode('${data.pairingCode}')">📋 Copy Code</button>
            <div class="steps">
              <p>
                <strong>How to link your WhatsApp:</strong><br>
                1. Open WhatsApp on your phone<br>
                2. Tap ⋮ Menu → Linked Devices<br>
                3. Tap "Link with phone number instead"<br>
                4. Enter the 8-digit code above
              </p>
            </div>
          </div>`;
        loadServers(); // Refresh server counts
      } else {
        resultDiv.innerHTML = `<div class="result-card error"><p class="error-msg">❌ ${data.error}</p></div>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `<div class="result-card error"><p class="error-msg">❌ Connection failed. Please try again.</p></div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = `🔑 Generate Pair Code`;
    }
  }

  function copyCode(code) {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy Code', 2000);
    });
  }

  document.getElementById('number').addEventListener('keypress', e => {
    if (e.key === 'Enter') generateCode();
  });

  // Load servers on start and refresh every 10 seconds
  loadServers();
  setInterval(loadServers, 10000);
</script>
</body>
</html>
