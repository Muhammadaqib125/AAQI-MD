<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAQI MD - Pairing Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6aff;
      --accent2: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Background glow effects */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,106,255,0.12);
      border: 1px solid rgba(124,106,255,0.25);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent2);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .badge span { 
      width: 6px; height: 6px; 
      background: var(--green); 
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: block;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    input:focus {
      border-color: rgba(124,106,255,0.5);
      background: rgba(124,106,255,0.05);
    }

    input::placeholder { color: var(--muted); }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Button */
    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), #9b87ff);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(124,106,255,0.35);
    }

    button:active:not(:disabled) { transform: translateY(0); }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Result area */
    #result { margin-top: 16px; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      animation: fadeUp 0.4s ease forwards;
    }

    .result-card.success { border-color: rgba(52,211,153,0.2); }
    .result-card.error { border-color: rgba(248,113,113,0.2); }

    .result-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .pairing-code {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 6px;
      color: white;
      background: linear-gradient(135deg, #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .server-info {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .steps {
      background: rgba(52,211,153,0.06);
      border: 1px solid rgba(52,211,153,0.15);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
    }

    .steps p {
      font-size: 13px;
      color: #a7f3d0;
      line-height: 1.8;
    }

    .steps strong {
      color: var(--green);
    }

    .error-msg {
      font-size: 14px;
      color: var(--red);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      color: var(--accent2);
      font-size: 14px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(124,106,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">
        <span></span>
        Server Online
      </div>
      <h1>AAQI MD</h1>
      <p class="subtitle">WhatsApp Linked Device Pairing System</p>
    </div>

    <div class="card">
      <label class="input-label">WhatsApp Number</label>
      <div class="input-wrapper">
        <span class="input-icon">📱</span>
        <input 
          type="tel" 
          id="number" 
          placeholder="923001234567"
          maxlength="15"
        />
      </div>
      <p class="hint">Include country code — e.g. 92 for Pakistan, 1 for USA</p>
    </div>

    <button id="btn" onclick="generateCode()">
      🔑 Generate Pairing Code
    </button>

    <div id="result"></div>

    <div class="footer">AAQI MD Bot • Powered by Baileys</div>
  </div>

  <script>
    async function generateCode() {
      const number = document.getElementById('number').value.trim();
      const resultDiv = document.getElementById('result');
      const btn = document.getElementById('btn');

      if (!number) {
        resultDiv.innerHTML = `
          <div class="result-card error">
            <p class="error-msg">❌ Please enter your WhatsApp number</p>
          </div>`;
        return;
      }

      // Disable button and show loading
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner"></div> Connecting to WhatsApp...`;

      resultDiv.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <span>Generating your pairing code... (8 seconds)</span>
        </div>`;

      try {
        const res = await fetch('/generate-pair', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: number })
        });

        const data = await res.json();

        if (data.success) {
          resultDiv.innerHTML = `
            <div class="result-card success">
              <p class="result-label">Your Pairing Code</p>
              <div class="pairing-code">${data.pairingCode}</div>
              <p class="server-info">✅ Connected to Server ${data.assignedServer}</p>
              <div class="steps">
                <p>
                  <strong>How to link:</strong><br>
                  1. Open WhatsApp on your phone<br>
                  2. Tap ⋮ Menu → Linked Devices<br>
                  3. Tap "Link with phone number"<br>
                  4. Enter the code above
                </p>
              </div>
            </div>`;
        } else {
          resultDiv.innerHTML = `
            <div class="result-card error">
              <p class="error-msg">❌ ${data.error}</p>
            </div>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `
          <div class="result-card error">
            <p class="error-msg">❌ Connection failed. Please try again.</p>
          </div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = `🔑 Generate Pairing Code`;
      }
    }

    // Allow Enter key to submit
    document.getElementById('number').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateCode();
    });
  </script>
</body>
</html>
