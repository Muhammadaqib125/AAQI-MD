<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAQI MD - Pairing Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 30px 20px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .logo {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    }

    .logo-text {
      font-size: 40px;
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      text-align: center;
      color: #c7d2fe;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #e0e7ff;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 17px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 25px 0 15px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
      min-height: 80px;
    }

    .info {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="logo-text">⚡</span>
    </div>
    
    <h1>AAQI MD</h1>
    <p class="subtitle">Generate Your Pairing Code</p>

    <div class="card">
      <label>WhatsApp Number</label>
      <input type="text" id="number" placeholder="923001234567" />
      <p class="info">Include country code (e.g., 92 for Pakistan)</p>
    </div>

    <button onclick="generateCode()">
      🔑 Generate Pair Code
    </button>

    <div id="result"></div>
  </div>

  <script>
    async function generateCode() {
      const number = document.getElementById('number').value.trim();
      const resultDiv = document.getElementById('result');

      if (!number) {
        resultDiv.innerHTML = `<p style="color:#f87171;">❌ Please enter your WhatsApp number</p>`;
        return;
      }

      resultDiv.innerHTML = `<p style="color:#a5b4fc;">⏳ Generating pairing code... Please wait</p>`;

      try {
        const res = await fetch('http://localhost:3000/generate-pair', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: number })
        });

        const data = await res.json();

        if (data.success) {
          resultDiv.innerHTML = `
            <h2 style="color:#34d399; font-size:22px;">✅ Your Pairing Code</h2>
            <h1 style="font-size:32px; letter-spacing:4px; color:#c4d0ff;">${data.pairingCode}</h1>
            <p style="color:#67e8f9;">Server ${data.assignedServer}</p>
            <p style="color:#86efac; margin-top:15px;">
              Go to WhatsApp → Linked Devices → Link with Phone Number
            </p>
          `;
        } else {
          resultDiv.innerHTML = `<p style="color:#f87171;">❌ ${data.error}</p>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<p style="color:#f87171;">❌ Server not running. Please start your backend.</p>`;
      }
    }
  </script>
</body>
</html>
